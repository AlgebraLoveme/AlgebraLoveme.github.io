{{ content }}

<h3 class="archive__subtitle">{{ site.data.ui-text[site.locale].recent_posts | default: "Recent Posts" }}</h3>

{% for post in paginator.posts %}
  {% include archive-single.html %}
{% endfor %}

{% include paginator.html %}

<div id="gitalk-container" class="page__comments"></div>

<script>
(() => {
  const container = document.getElementById('gitalk-container');
  let loaded = false;

  const loadGitalk = () => {
    if (loaded) return;
    loaded = true;

    const stylesheet = document.createElement('link');
    stylesheet.rel = 'stylesheet';
    stylesheet.href = 'https://cdn.jsdelivr.net/npm/gitalk@1/dist/gitalk.css';
    document.head.appendChild(stylesheet);

    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/gitalk@1/dist/gitalk.min.js';
    script.async = true;
    script.onload = () => {
      new Gitalk({
        clientID: 'c9688e0c65375364a06a',
        clientSecret: '8df2e39f843080e28444928ecad0529446543bc1',
        repo: 'AlgebraLoveme.github.io',
        owner: 'AlgebraLoveme',
        admin: ['AlgebraLoveme'],
        id: '/',
        distractionFreeMode: false,
        language: 'en'
      }).render('gitalk-container');
    };
    document.body.appendChild(script);
  };

  if ('IntersectionObserver' in window) {
    const observer = new IntersectionObserver((entries) => {
      if (entries.some((entry) => entry.isIntersecting)) {
        observer.disconnect();
        loadGitalk();
      }
    }, { rootMargin: '200px 0px' });
    observer.observe(container);
  } else if ('requestIdleCallback' in window) {
    requestIdleCallback(loadGitalk, { timeout: 4000 });
  } else {
    setTimeout(loadGitalk, 2000);
  }
})();
</script>
